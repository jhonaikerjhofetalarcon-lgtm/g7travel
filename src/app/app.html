<!-- Navbar solo en rutas públicas -->
@if (!isAdminRoute && !isLoginRoute) {
  <nav class="navbar" [class.scrolled]="scrolled">
    <div class="nav-logo">
      <img src="" alt="G7" onerror="this.style.display='none'">
      <span class="nav-marca">G7 Travel</span>
    </div>

    <div class="nav-menu" [class.open]="menuOpen">
      <a routerLink="/home"      routerLinkActive="activo" (click)="menuOpen=false">Inicio</a>
      <a routerLink="/destinos"  routerLinkActive="activo" (click)="menuOpen=false">Destinos</a>
      <a routerLink="/reservas"  routerLinkActive="activo" class="nav-cta" (click)="menuOpen=false">Reservar ahora</a>
      <a routerLink="/contacto"  routerLinkActive="activo" (click)="menuOpen=false">Contacto</a>
      @if (isLoggedIn) {
        <a routerLink="/dash" routerLinkActive="activo" (click)="menuOpen=false">Panel Admin</a>
      } @else {
        <a routerLink="/login" routerLinkActive="activo" (click)="menuOpen=false">Ingresar</a>
      }
    </div>

    <button class="hamburger" [class.open]="menuOpen" (click)="menuOpen=!menuOpen" aria-label="Menú">
      <span></span><span></span><span></span>
    </button>
  </nav>
}

<div class="container">
  <router-outlet></router-outlet>
</div>
